<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>App Escolar - Desayunos</title>

  <!-- CSS locales -->
  <link rel="stylesheet" href="css/bootstrap.min.css"/>
  <link rel="stylesheet" href="css/fontawesome-all.min.css"/>
  <link rel="stylesheet" href="css/styles.css"/>
  <link rel="stylesheet" href="css/introjs.min.css"/>

  <style>
    /* Pequeño ajuste para que el footer no tape contenido cuando header es fixed-top */
    main { padding-top: 1rem; }
    .tabla-scroll { overflow-x: auto; }
  </style>
</head>
<body>
  <header class="fixed-top">
    <img src="img/logoEdoMex2.jpg" alt="Gobierno del Estado de México" class="h-100" style="object-fit: cover; max-width: 150px;">
    <div class="dropdown text-white">
      <button class="btn btn-outline-secondary dropdown-toggle text-white" type="button" data-bs-toggle="dropdown">
        <i class="fas fa-bars"></i>
      </button>
      <ul class="dropdown-menu">
        <li><a class="dropdown-item" href="index.html">Lista</a></li>
        <li><a class="dropdown-item" href="colectas.html">Colecta</a></li>
        <li><a class="dropdown-item bg-secondary text-white" href="desayunos.html">Desayunos</a></li>
        <li><a class="dropdown-item" href="historial.html">Historial</a></li>
        <li><a class="dropdown-item" href="configurar.html">Configurar</a></li>
        <li><hr class="dropdown-divider"></li>
        <li><button class="dropdown-item text-primary" id="verGuia">Ver guía</button></li>
      </ul>
    </div>
  </header>

  <main class="container my-3" style="padding-top:1rem;">
    <div class="d-flex justify-content-between mb-3">
      <button class="btn btn-primary btn-sm w-50" style="font-size: 0.8em;" onclick="abrirFormularioDesayuno()">
        <i class="fas fa-user-plus fa-sm"></i> Agregar Alumno
      </button>
      <button class="btn btn-success btn-sm" style="font-size: 0.8em;" onclick="archivarListaEntrega()">
        <i class="fas fa-utensils fa-sm"></i> Archivar
      </button>
    </div>

    <div id="listaDesayunos" class="table-responsive table-scroll"></div>
    <br><br>
  </main>

  <footer class="text-center text-white py-2" style="font-size: 0.8em;">
    <p id="footerDesayunos">Cargando ciclo...</p>
  </footer>

  <!-- JS locales: librerías primero, luego el código de la página -->
  <script src="js/localforage.min.js"></script>
  <script src="js/sweetalert2.min.js"></script>
  <script src="js/intro.min.js"></script>
  <script src="js/desayunos.js"></script>
  <script src="js/bootstrap.bundle.min.js"></script>
</body>
</html>
